<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy → slate -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <!-- Accent gradient: vivid blue → indigo -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- ── Subtle grid pattern (background texture) ── -->
  <g opacity="0.06" stroke="#94A3B8" stroke-width="1">
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
  </g>

  <!-- ── Glowing circle halo behind icon ── -->
  <circle cx="256" cy="248" r="152" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.18" filter="url(#glow)"/>
  <circle cx="256" cy="248" r="128" fill="#1E3A5F" opacity="0.45"/>

  <!-- ── Clipboard body ── -->
  <rect x="154" y="148" width="204" height="240" rx="14" fill="#0F2744" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>

  <!-- ── Clipboard clip (top bar) ── -->
  <rect x="210" y="136" width="92" height="28" rx="8" fill="url(#accent)" opacity="0.95"/>
  <rect x="236" y="128" width="40" height="18" rx="6" fill="#38BDF8"/>

  <!-- ── Row lines (attendance rows) ── -->
  <rect x="178" y="200" width="156" height="10" rx="5" fill="#334155"/>
  <rect x="178" y="224" width="156" height="10" rx="5" fill="#334155"/>
  <rect x="178" y="248" width="156" height="10" rx="5" fill="#334155"/>
  <rect x="178" y="272" width="120" height="10" rx="5" fill="#334155"/>

  <!-- ── Big checkmark (accent, glowing) ── -->
  <g filter="url(#glow)" opacity="0.98">
    <polyline
      points="188,310 228,352 324,252"
      fill="none"
      stroke="url(#accent)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- ── Small dot indicator (top-right of clipboard) ── -->
  <circle cx="326" cy="172" r="10" fill="#22C55E" opacity="0.9"/>
  <circle cx="326" cy="172" r="5"  fill="#DCFCE7"/>
</svg>
