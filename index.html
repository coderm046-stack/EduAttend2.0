<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1426" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EduAttend" />
  <meta name="description" content="EduAttend — School Attendance Management" />
  <title>EduAttend - School Attendance</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;background:#0B1426;font-family:'Nunito','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    ::-webkit-scrollbar{display:none}
    *{scrollbar-width:none;-ms-overflow-style:none}
    input,select,textarea,button{font-family:'Nunito','Segoe UI',sans-serif;-webkit-appearance:none;appearance:none}
    body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel" data-presets="react">
const{useState,useMemo}=React;

/* ── THEME ── */
const T={bg:'#0B1426',surface:'#111F35',card:'#162236',card2:'#1C2D44',border:'#1E3A5F',border2:'#243B5E',text:'#F0F6FF',sub:'#94A3B8',muted:'#4A6080',accent:'#38BDF8',indigo:'#818CF8',green:'#34D399',red:'#F87171',yellow:'#FBBF24',orange:'#FB923C'};

/* ── CLASS / DIVISION CONSTANTS ── */
const CLASS_LIST=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
const DIV_LIST=Array.from({length:26},(_,i)=>String.fromCharCode(65+i));

/* ── USERS ── */
const USERS={
  admin:    {pw:'admin123',role:'admin',    name:'Administrator',      color:T.indigo},
  teacher1: {pw:'teach001',role:'teacher',  name:'Ms. Priya Sharma',   color:T.accent},
  teacher2: {pw:'teach002',role:'teacher',  name:'Mr. Rahul Verma',    color:T.accent},
  teacher3: {pw:'teach003',role:'teacher',  name:'Ms. Anjali Patel',   color:T.accent},
  principal:{pw:'prin456', role:'principal',name:'Dr. S. Mehta',       color:T.yellow}
};

/* ── DATE UTILS ── */
const pad=n=>String(n).padStart(2,'0');
const dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey=()=>dateKey(new Date());
const isSunday=str=>new Date(str+'T12:00:00').getDay()===0;
const fmtDate=str=>new Date(str+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
const monthLabel=(y,m)=>new Date(y,m,1).toLocaleString('en-IN',{month:'long',year:'numeric'});
const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
const monthDateKeys=(y,m)=>Array.from({length:daysInMonth(y,m)},(_,i)=>dateKey(new Date(y,m,i+1)));
const uid=()=>Math.random().toString(36).slice(2,9);
const getWorkingDays=(y,m,holidays)=>{const hSet=new Set(holidays.map(h=>h.date));return monthDateKeys(y,m).filter(d=>!isSunday(d)&&!hSet.has(d));};
const sortClasses=arr=>[...arr].sort((a,b)=>{const ai=CLASS_LIST.indexOf(a.className),bi=CLASS_LIST.indexOf(b.className);return ai!==bi?ai-bi:a.division.localeCompare(b.division);});

/* ── LOCAL STORAGE ── */
function useLs(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=val=>setV(prev=>{const next=typeof val==='function'?val(prev):val;try{localStorage.setItem(key,JSON.stringify(next));}catch{}return next;});
  return[v,set];
}

/* ── UI HELPERS ── */
const SS={minHeight:'100dvh',background:T.bg,fontFamily:"'Nunito',sans-serif",color:T.text,overflowX:'hidden'};
const pctColor=p=>p===null?T.muted:p>=75?T.green:p>=50?T.yellow:T.red;

function Btn({children,onClick,color=T.accent,text=T.bg,outline=false,full=false,sm=false,disabled=false,style={}}){
  return<button onClick={onClick} disabled={disabled} style={{background:outline?'transparent':disabled?T.muted:color,color:outline?color:disabled?T.surface:text,border:outline?`1.5px solid ${disabled?T.muted:color}`:'none',borderRadius:10,padding:sm?'7px 14px':'11px 22px',fontWeight:800,fontSize:sm?12:14,cursor:disabled?'not-allowed':'pointer',fontFamily:"'Nunito',sans-serif",width:full?'100%':undefined,opacity:disabled?.55:1,letterSpacing:'0.02em',...style}}>{children}</button>;
}

function Inp({label,value,onChange,type='text',placeholder=''}){
  return<div style={{marginBottom:14}}>
    {label&&<label style={{fontSize:11,fontWeight:800,color:T.sub,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>{label}</label>}
    <input type={type} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} style={{background:T.surface,color:T.text,border:`1.5px solid ${T.border2}`,borderRadius:10,padding:'11px 14px',fontSize:14,fontFamily:"'Nunito',sans-serif",width:'100%',outline:'none',boxSizing:'border-box'}}/>
  </div>;
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return<div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
    <div style={{background:T.card2,borderRadius:'22px 22px 0 0',border:`1px solid ${T.border}`,borderBottom:'none',padding:'24px 20px 36px',width:'100%',maxWidth:520,maxHeight:'90dvh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <span style={{fontSize:18,fontWeight:900,color:T.text}}>{title}</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:T.sub,fontSize:22,cursor:'pointer',lineHeight:1}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

function Badge({children,color=T.accent}){return<span style={{background:color+'22',color,border:`1px solid ${color}44`,borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:800,letterSpacing:'0.04em'}}>{children}</span>;}

function Header({user,onLogout}){
  const rLabel={admin:'ADMIN',teacher:'TEACHER',principal:'PRINCIPAL'}[user.role];
  return<div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'13px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:200}}>
    <div>
      <div style={{fontSize:20,fontWeight:900,color:T.accent,letterSpacing:'-0.5px'}}>📋 EduAttend</div>
      <div style={{fontSize:12,color:T.sub,marginTop:1}}>{user.name}</div>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <Badge color={user.color}>{rLabel}</Badge>
      <button onClick={onLogout} style={{background:'none',border:`1.5px solid ${T.border2}`,color:T.sub,borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>Logout</button>
    </div>
  </div>;
}

function TabBar({tabs,active,onChange}){
  return<div style={{display:'flex',background:T.surface,borderTop:`1px solid ${T.border}`,position:'fixed',bottom:0,left:0,right:0,zIndex:200}}>
    {tabs.map(t=>{const on=t.id===active;return<button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,background:'none',border:'none',borderTop:`2.5px solid ${on?T.accent:'transparent'}`,color:on?T.accent:T.muted,padding:'9px 4px 7px',fontSize:10,fontWeight:800,letterSpacing:'0.04em',cursor:'pointer',fontFamily:"'Nunito',sans-serif",display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
      <span style={{fontSize:22}}>{t.icon}</span>{t.label}
    </button>;})}
  </div>;
}

function Stat({value,label,color=T.text}){return<div style={{textAlign:'center'}}><div style={{fontSize:24,fontWeight:900,color}}>{value}</div><div style={{fontSize:10,color:T.sub,fontWeight:700,marginTop:2}}>{label}</div></div>;}

function MonthNav({y,m,onChange}){
  return<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'12px 18px',marginBottom:16}}>
    <button onClick={()=>onChange(m===0?{y:y-1,m:11}:{y,m:m-1})} style={{background:'none',border:'none',color:T.accent,cursor:'pointer',fontSize:26,lineHeight:1}}>‹</button>
    <span style={{fontWeight:900,fontSize:16,color:T.text}}>{monthLabel(y,m)}</span>
    <button onClick={()=>onChange(m===11?{y:y+1,m:0}:{y,m:m+1})} style={{background:'none',border:'none',color:T.accent,cursor:'pointer',fontSize:26,lineHeight:1}}>›</button>
  </div>;
}

function WDStrip({y,m,holidays}){
  const all=monthDateKeys(y,m),suns=all.filter(isSunday).length;
  const hSet=new Set(holidays.map(h=>h.date)),hols=all.filter(d=>!isSunday(d)&&hSet.has(d)).length;
  return<div style={{display:'flex',justifyContent:'space-around',background:`linear-gradient(135deg,${T.accent}15,${T.indigo}15)`,border:`1px solid ${T.accent}33`,borderRadius:14,padding:'14px 10px',marginBottom:16}}>
    <Stat value={all.length} label="TOTAL" color={T.text}/><Stat value={suns} label="SUNDAYS" color={T.indigo}/><Stat value={hols} label="HOLIDAYS" color={T.yellow}/><Stat value={all.length-suns-hols} label="WORKING" color={T.green}/>
  </div>;
}

function PctBar({pct}){const c=pctColor(pct);return<div style={{background:T.surface,borderRadius:6,height:8,marginTop:8,marginBottom:8}}><div style={{background:`linear-gradient(90deg,${c},${c}99)`,width:`${pct||0}%`,height:'100%',borderRadius:6,transition:'width .6s'}}/></div>;}

/* Gender summary row used in multiple views */
function GenderRow({icon,label,color,present,absent,total,pct}){
  return<div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 0',borderBottom:`1px solid ${T.border}22`}}>
    <span style={{fontSize:16,minWidth:22}}>{icon}</span>
    <span style={{fontSize:13,fontWeight:800,color,minWidth:52}}>{label}</span>
    <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4,textAlign:'center'}}>
      <div><div style={{fontSize:15,fontWeight:900,color:T.green}}>{present}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>PRESENT</div></div>
      <div><div style={{fontSize:15,fontWeight:900,color:T.red}}>{absent}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>ABSENT</div></div>
      <div><div style={{fontSize:15,fontWeight:900,color}}>{total}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>TOTAL</div></div>
      <div><div style={{fontSize:15,fontWeight:900,color:pctColor(pct)}}>{pct!==null?`${pct}%`:'—'}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>RATE</div></div>
    </div>
  </div>;
}

/* ════════════════════════════════════════
   LOGIN
════════════════════════════════════════ */
function LoginScreen({onLogin}){
  const[uname,setUname]=useState('');
  const[pw,setPw]=useState('');
  const[show,setShow]=useState(false);
  const[err,setErr]=useState('');
  const handle=()=>{const u=USERS[uname.trim()];if(!u){setErr('Username not found');return;}if(u.pw!==pw){setErr('Incorrect password');return;}setErr('');onLogin(uname.trim(),u);};
  return<div style={{...SS,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:`radial-gradient(ellipse at 25% 15%, #1A3A60 0%, ${T.bg} 55%)`}}>
    <div style={{marginBottom:36,textAlign:'center'}}>
      <div style={{width:86,height:86,borderRadius:24,background:`linear-gradient(135deg,${T.accent},${T.indigo})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:42,margin:'0 auto 16px',boxShadow:`0 16px 48px ${T.accent}44`}}>📋</div>
      <div style={{fontSize:34,fontWeight:900,color:T.text,letterSpacing:'-1px'}}>EduAttend</div>
      <div style={{fontSize:14,color:T.sub,marginTop:4}}>School Attendance System</div>
    </div>
    <div style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:20,padding:28,width:'100%',maxWidth:380,boxShadow:`0 24px 64px rgba(0,0,0,.5)`}}>
      <Inp label="Username" value={uname} onChange={setUname} placeholder="admin / teacher1 / principal"/>
      <div style={{marginBottom:14}}>
        <label style={{fontSize:11,fontWeight:800,color:T.sub,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>Password</label>
        <div style={{position:'relative'}}>
          <input type={show?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} placeholder="Enter password"
            style={{background:T.surface,color:T.text,border:`1.5px solid ${T.border2}`,borderRadius:10,padding:'11px 44px 11px 14px',fontSize:14,fontFamily:"'Nunito',sans-serif",width:'100%',outline:'none',boxSizing:'border-box'}}/>
          <button onClick={()=>setShow(!show)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:T.sub}}>{show?'🙈':'👁️'}</button>
        </div>
      </div>
      {err&&<div style={{color:T.red,fontSize:13,fontWeight:700,marginBottom:12,textAlign:'center'}}>{err}</div>}
      <Btn onClick={handle} full>Sign In →</Btn>
    </div>
    <div style={{marginTop:24,background:`${T.card}99`,border:`1px solid ${T.border}`,borderRadius:14,padding:16,width:'100%',maxWidth:380}}>
      <div style={{fontSize:11,fontWeight:800,color:T.sub,marginBottom:10,letterSpacing:'0.06em'}}>DEMO CREDENTIALS — tap to auto-fill</div>
      {Object.entries(USERS).map(([un,u])=>(
        <div key={un} onClick={()=>{setUname(un);setPw(u.pw);}} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 8px',borderRadius:8,cursor:'pointer',marginBottom:2}}
          onMouseEnter={e=>e.currentTarget.style.background=T.surface} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{fontSize:13,fontWeight:700,color:T.text,width:90}}>{un}</span>
          <span style={{fontSize:13,color:T.sub,fontFamily:'monospace',flex:1}}>{u.pw}</span>
          <Badge color={u.color}>{u.role.slice(0,5).toUpperCase()}</Badge>
        </div>
      ))}
    </div>
  </div>;
}

/* ════════════════════════════════════════
   ADMIN — CLASSES  (redesigned)
════════════════════════════════════════ */
function AdminClasses({classes,setClasses}){
  const[showNew,setShowNew]=useState(false);
  const[selClass,setSelClass]=useState('I');
  const[selDiv,setSelDiv]=useState('A');
  const[boys,setBoys]=useState('');
  const[girls,setGirls]=useState('');
  const[expanded,setExpanded]=useState(null);

  const total=(parseInt(boys)||0)+(parseInt(girls)||0);

  const selStyle={background:T.surface,color:T.text,border:`1.5px solid ${T.border2}`,borderRadius:10,padding:'11px 14px',fontSize:14,fontFamily:"'Nunito',sans-serif",width:'100%',outline:'none'};

  const createClass=()=>{
    const b=parseInt(boys)||0,g=parseInt(girls)||0;
    if(b+g===0){alert('Please enter the number of boys and/or girls.');return;}
    const name=`Class ${selClass}-${selDiv}`;
    if(classes.find(c=>c.className===selClass&&c.division===selDiv)){alert(`${name} already exists!`);return;}
    setClasses(p=>[...p,{id:uid(),className:selClass,division:selDiv,name,boys:b,girls:g}]);
    setBoys('');setGirls('');setShowNew(false);
  };

  const deleteClass=id=>{if(!window.confirm('Delete this class?'))return;setClasses(p=>p.filter(c=>c.id!==id));};
  const updateStr=(id,field,val)=>setClasses(p=>p.map(c=>c.id===id?{...c,[field]:Math.max(0,parseInt(val)||0)}:c));

  const numInStyle=(color)=>({
    background:T.surface,color,border:`1.5px solid ${color}55`,borderRadius:8,
    padding:'10px',fontSize:20,fontWeight:900,fontFamily:"'Nunito',sans-serif",
    width:'100%',outline:'none',textAlign:'center'
  });

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:900,color:T.text}}>Classes</div>
        <Btn sm onClick={()=>setShowNew(true)} color={T.green} text={T.bg}>+ New Class</Btn>
      </div>

      {classes.length===0&&<div style={{textAlign:'center',padding:'50px 0',background:T.card,border:`1px dashed ${T.border2}`,borderRadius:16}}>
        <div style={{fontSize:40,marginBottom:12}}>🏫</div>
        <div style={{color:T.sub,fontSize:14}}>No classes yet. Tap + New Class to begin.</div>
      </div>}

      {sortClasses(classes).map(cls=>{
        const isOpen=expanded===cls.id,tot=cls.boys+cls.girls;
        return(
          <div key={cls.id} style={{background:T.card,border:`1px solid ${isOpen?T.accent:T.border}`,borderRadius:16,marginBottom:12,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'15px 18px',cursor:'pointer'}} onClick={()=>setExpanded(isOpen?null:cls.id)}>
              <div>
                <div style={{fontWeight:900,fontSize:16,color:T.text}}>{cls.name}</div>
                <div style={{fontSize:12,marginTop:3,display:'flex',gap:12}}>
                  <span style={{color:T.accent}}>👦 Boys: {cls.boys}</span>
                  <span style={{color:T.orange}}>👧 Girls: {cls.girls}</span>
                  <span style={{color:T.green,fontWeight:800}}>Total: {tot}</span>
                </div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <Badge color={T.green}>{tot}</Badge>
                <span style={{color:T.sub,fontSize:18}}>{isOpen?'▲':'▼'}</span>
              </div>
            </div>
            {isOpen&&<div style={{borderTop:`1px solid ${T.border}`,padding:'16px 18px'}}>
              <div style={{fontSize:11,fontWeight:800,color:T.sub,marginBottom:10,letterSpacing:'0.05em'}}>EDIT CLASS STRENGTH</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
                <div>
                  <label style={{fontSize:11,fontWeight:800,color:T.accent,textTransform:'uppercase',letterSpacing:'0.06em',display:'block',marginBottom:5}}>👦 Boys</label>
                  <input type="number" min="0" value={cls.boys} onChange={e=>updateStr(cls.id,'boys',e.target.value)} style={numInStyle(T.accent)}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:800,color:T.orange,textTransform:'uppercase',letterSpacing:'0.06em',display:'block',marginBottom:5}}>👧 Girls</label>
                  <input type="number" min="0" value={cls.girls} onChange={e=>updateStr(cls.id,'girls',e.target.value)} style={numInStyle(T.orange)}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:800,color:T.green,textTransform:'uppercase',letterSpacing:'0.06em',display:'block',marginBottom:5}}>Total</label>
                  <div style={{background:T.surface,border:`1.5px solid ${T.green}33`,borderRadius:8,padding:'10px',fontSize:20,fontWeight:900,color:T.green,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',minHeight:46}}>{cls.boys+cls.girls}</div>
                </div>
              </div>
              <Btn sm outline color={T.red} onClick={()=>deleteClass(cls.id)}>🗑 Delete Class</Btn>
            </div>}
          </div>
        );
      })}

      {/* CREATE NEW CLASS MODAL */}
      <Modal open={showNew} onClose={()=>setShowNew(false)} title="Create New Class">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <label style={{fontSize:11,fontWeight:800,color:T.sub,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>Class</label>
            <select value={selClass} onChange={e=>setSelClass(e.target.value)} style={selStyle}>
              {CLASS_LIST.map(c=><option key={c} value={c}>Class {c}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:800,color:T.sub,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>Division</label>
            <select value={selDiv} onChange={e=>setSelDiv(e.target.value)} style={selStyle}>
              {DIV_LIST.map(d=><option key={d} value={d}>Division {d}</option>)}
            </select>
          </div>
        </div>

        <div style={{background:`${T.accent}12`,border:`1px solid ${T.accent}33`,borderRadius:10,padding:'10px 16px',marginBottom:16,textAlign:'center'}}>
          <span style={{fontSize:16,fontWeight:900,color:T.accent}}>Class {selClass} — Division {selDiv}</span>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <label style={{fontSize:11,fontWeight:800,color:T.accent,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>👦 No. of Boys</label>
            <input type="number" min="0" value={boys} placeholder="0" onChange={e=>setBoys(e.target.value)}
              style={{background:T.surface,color:T.accent,border:`1.5px solid ${T.accent}66`,borderRadius:10,padding:'12px',fontSize:24,fontWeight:900,fontFamily:"'Nunito',sans-serif",width:'100%',outline:'none',textAlign:'center'}}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:800,color:T.orange,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>👧 No. of Girls</label>
            <input type="number" min="0" value={girls} placeholder="0" onChange={e=>setGirls(e.target.value)}

/* ════════════════════════════════════════
   ADMIN — HOLIDAYS  (unchanged)
════════════════════════════════════════ */
function AdminHolidays({holidays,setHolidays}){
  const[mode,setMode]=useState('single');
  const[sDate,setSDate]=useState(todayKey());
  const[rStart,setRStart]=useState(todayKey());
  const[rEnd,setREnd]=useState(todayKey());
  const[reason,setReason]=useState('');
  const[vp,setVp]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const hSet=new Set(holidays.map(h=>h.date));
  const addSingle=()=>{if(!sDate)return;if(hSet.has(sDate)){alert('Already a holiday');return;}setHolidays(p=>[...p,{date:sDate,reason:reason.trim()||'Holiday'}]);setReason('');};
  const addRange=()=>{
    if(rStart>rEnd){alert('Start must be before end');return;}
    const toAdd=[],cur=new Date(rStart+'T12:00:00'),end=new Date(rEnd+'T12:00:00');
    while(cur<=end){const k=dateKey(cur);if(!hSet.has(k))toAdd.push({date:k,reason:reason.trim()||'Holiday'});cur.setDate(cur.getDate()+1);}
    if(toAdd.length===0){alert('All dates already holidays');return;}
    setHolidays(p=>[...p,...toAdd]);setReason('');alert(`Added ${toAdd.length} holiday${toAdd.length>1?'s':''}`);
  };
  const addSundaysOfYear=yr=>{
    const toAdd=[],d=new Date(yr,0,1);
    while(d.getDay()!==0)d.setDate(d.getDate()+1);
    while(d.getFullYear()===yr){const k=dateKey(d);if(!hSet.has(k))toAdd.push({date:k,reason:'Sunday'});d.setDate(d.getDate()+7);}
    setHolidays(p=>[...p,...toAdd]);alert(`Added ${toAdd.length} Sundays of ${yr}`);
  };
  const remove=date=>setHolidays(p=>p.filter(h=>h.date!==date));
  const{y,m}=vp;
  const monthHols=holidays.filter(h=>{const[hy,hm]=h.date.split('-').map(Number);return hy===y&&hm-1===m;}).sort((a,b)=>a.date.localeCompare(b.date));
  const modeBtn=(id,label)=><button onClick={()=>setMode(id)} style={{flex:1,background:mode===id?T.accent:T.surface,color:mode===id?T.bg:T.sub,border:'none',borderRadius:8,padding:'8px 4px',fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>{label}</button>;
  return<div>
    <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:16}}>Holidays & Vacations</div>
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18,marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:12}}>Add Holiday</div>
      <div style={{display:'flex',gap:6,marginBottom:16}}>{modeBtn('single','📌 Single Day')}{modeBtn('range','📆 Date Range')}{modeBtn('auto','🔄 Auto Sundays')}</div>
      {mode==='single'&&<><Inp label="Date" type="date" value={sDate} onChange={setSDate}/><Inp label="Reason (optional)" value={reason} onChange={setReason} placeholder="e.g. Diwali, Republic Day…"/><Btn full onClick={addSingle}>📌 Add Holiday</Btn></>}
      {mode==='range'&&<><Inp label="From Date" type="date" value={rStart} onChange={setRStart}/><Inp label="To Date" type="date" value={rEnd} onChange={setREnd}/><Inp label="Reason (optional)" value={reason} onChange={setReason} placeholder="e.g. Summer Vacation…"/><Btn full onClick={addRange} color={T.orange}>📆 Add Date Range</Btn></>}
      {mode==='auto'&&<div>
        <div style={{fontSize:13,color:T.sub,marginBottom:16,lineHeight:1.6}}>Auto-mark all Sundays of a year.<br/><span style={{color:T.green,fontWeight:700}}>Note:</span> Sundays are always excluded from attendance regardless.</div>
        {[new Date().getFullYear()-1,new Date().getFullYear(),new Date().getFullYear()+1].map(yr=>(
          <div key={yr} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${T.border}44`}}>
            <div><div style={{fontWeight:800,color:T.text}}>All Sundays of {yr}</div><div style={{fontSize:12,color:T.sub}}>52–53 dates</div></div>
            <Btn sm onClick={()=>addSundaysOfYear(yr)} color={T.yellow} text={T.bg}>Add All</Btn>
          </div>
        ))}
      </div>}
    </div>
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18}}>
      <MonthNav y={y} m={m} onChange={setVp}/>
      <WDStrip y={y} m={m} holidays={holidays}/>
      {monthHols.length===0?<div style={{textAlign:'center',color:T.muted,fontSize:13,padding:'20px 0'}}>No holidays in {monthLabel(y,m)}</div>
        :monthHols.map(h=>(
          <div key={h.date} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${T.border}33`}}>
            <div><div style={{fontWeight:700,fontSize:14,color:T.text}}>{fmtDate(h.date)}</div><div style={{fontSize:12,color:T.sub,marginTop:2}}>{isSunday(h.date)?'🔵 Sunday':`🟡 ${h.reason}`}</div></div>
            <button onClick={()=>remove(h.date)} style={{background:'none',border:'none',color:T.red,cursor:'pointer',fontSize:20,padding:'4px 8px'}}>✕</button>
          </div>
        ))
      }
    </div>
  </div>;
}

/* ════════════════════════════════════════
   ADMIN — SUMMARY  (boys/girls breakdown)
════════════════════════════════════════ */
function AdminSummary({classes,holidays,attendance}){
  const now=new Date();
  const[vp,setVp]=useState({y:now.getFullYear(),m:now.getMonth()});
  const workDays=useMemo(()=>getWorkingDays(vp.y,vp.m,holidays),[vp,holidays]);
  const sorted=sortClasses(classes);

  // school-wide totals
  const schoolTotals=useMemo(()=>{
    let bpAll=0,gpAll=0,bStr=0,gStr=0;
    sorted.forEach(cls=>{
      bStr+=cls.boys;gStr+=cls.girls;
      workDays.forEach(date=>{const d=attendance[date]?.[cls.id]||{};bpAll+=d.bp||0;gpAll+=d.gp||0;});
    });
    const maxB=workDays.length*bStr,maxG=workDays.length*gStr;
    return{bpAll,gpAll,bStr,gStr,maxB,maxG,pres:bpAll+gpAll,total:maxB+maxG};
  },[sorted,workDays,attendance]);

  return(
    <div>
      <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:16}}>Attendance Summary</div>
      <MonthNav y={vp.y} m={vp.m} onChange={setVp}/>
      <WDStrip y={vp.y} m={vp.m} holidays={holidays}/>
      {classes.length===0&&<div style={{textAlign:'center',color:T.muted,fontSize:14,padding:'40px 0'}}>No classes created yet.</div>}

      {/* School-wide card */}
      {classes.length>0&&(()=>{
        const{bpAll,gpAll,bStr,gStr,maxB,maxG,pres,total}=schoolTotals;
        const pct=total>0?Math.round(pres/total*100):null;
        return(
          <div style={{background:`linear-gradient(135deg,${T.accent}15,${T.indigo}15)`,border:`1px solid ${T.accent}33`,borderRadius:16,padding:'16px 18px',marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:800,color:T.sub,marginBottom:8,letterSpacing:'0.04em'}}>SCHOOL-WIDE — {monthLabel(vp.y,vp.m)}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:13,color:T.sub}}>{pres} present of {total} attendance slots</div>
              <div style={{fontSize:32,fontWeight:900,color:pctColor(pct)}}>{pct!==null?`${pct}%`:'—'}</div>
            </div>
            {pct!==null&&<PctBar pct={pct}/>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}}>
              <div style={{background:`${T.accent}15`,borderRadius:8,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:11,fontWeight:800,color:T.accent,marginBottom:4}}>👦 BOYS ({bStr} strength)</div>
                <div style={{display:'flex',justifyContent:'space-around'}}>
                  <div><div style={{fontSize:17,fontWeight:900,color:T.green}}>{bpAll}</div><div style={{fontSize:9,color:T.sub}}>PRESENT</div></div>
                  <div><div style={{fontSize:17,fontWeight:900,color:T.red}}>{maxB-bpAll}</div><div style={{fontSize:9,color:T.sub}}>ABSENT</div></div>
                </div>
              </div>
              <div style={{background:`${T.orange}15`,borderRadius:8,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:11,fontWeight:800,color:T.orange,marginBottom:4}}>👧 GIRLS ({gStr} strength)</div>
                <div style={{display:'flex',justifyContent:'space-around'}}>
                  <div><div style={{fontSize:17,fontWeight:900,color:T.green}}>{gpAll}</div><div style={{fontSize:9,color:T.sub}}>PRESENT</div></div>
                  <div><div style={{fontSize:17,fontWeight:900,color:T.red}}>{maxG-gpAll}</div><div style={{fontSize:9,color:T.sub}}>ABSENT</div></div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Per-class cards */}
      {sorted.map(cls=>{
        let bp=0,gp=0,daysEntered=0;
        workDays.forEach(date=>{const d=attendance[date]?.[cls.id];if(d&&(d.bp!==undefined||d.gp!==undefined)){bp+=d.bp||0;gp+=d.gp||0;daysEntered++;}});
        const tot=cls.boys+cls.girls,maxSlots=workDays.length*tot;
        const pres=bp+gp,pct=maxSlots>0?Math.round(pres/maxSlots*100):null,pc=pctColor(pct);
        const bPct=workDays.length*cls.boys>0?Math.round(bp/(workDays.length*cls.boys)*100):null;
        const gPct=workDays.length*cls.girls>0?Math.round(gp/(workDays.length*cls.girls)*100):null;
        return(
          <div key={cls.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,marginBottom:14,overflow:'hidden'}}>
            <div style={{padding:'16px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:900,fontSize:17,color:T.text}}>{cls.name}</div>
                  <div style={{fontSize:12,color:T.sub,marginTop:2}}>{daysEntered}/{workDays.length} days entered · {tot} students</div>
                </div>
                <div style={{fontSize:28,fontWeight:900,color:pc}}>{pct!==null?`${pct}%`:'—'}</div>
              </div>
              {pct!==null&&<PctBar pct={pct}/>}
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,padding:'12px 18px'}}>
              <GenderRow icon="👦" label="Boys" color={T.accent} present={bp} absent={workDays.length*cls.boys-bp} total={cls.boys} pct={bPct}/>
              <GenderRow icon="👧" label="Girls" color={T.orange} present={gp} absent={workDays.length*cls.girls-gp} total={cls.girls} pct={gPct}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,marginTop:2}}>
                <span style={{fontSize:12,fontWeight:800,color:T.sub}}>Overall</span>
                <div style={{display:'flex',gap:12,fontSize:13,fontWeight:800}}>
                  <span style={{color:T.green}}>P: {pres}</span>
                  <span style={{color:T.red}}>A: {maxSlots-pres}</span>
                  <span style={{color:T.text}}>{maxSlots} slots</span>
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ════════════════════════════════════════
   TEACHER — TODAY  (boys/girls present input, absent auto)
════════════════════════════════════════ */
function TeacherToday({classes,selectedClass,holidays,attendance,setAttendance}){
  const[date,setDate]=useState(todayKey());
  const hSet=new Set(holidays.map(h=>h.date));
  const isHoliday=hSet.has(date)||isSunday(date);
  const cls=classes.find(c=>c.id===selectedClass);
  const dayAtt=cls?attendance[date]?.[cls.id]||{}:{};
  const bp=dayAtt.bp!==undefined?dayAtt.bp:'';
  const gp=dayAtt.gp!==undefined?dayAtt.gp:'';
  const hasData=bp!==''||gp!=='';
  const bpN=bp===''?0:parseInt(bp);
  const gpN=gp===''?0:parseInt(gp);
  const baN=cls?Math.max(0,cls.boys-bpN):0;
  const gaN=cls?Math.max(0,cls.girls-gpN):0;
  const totS=cls?cls.boys+cls.girls:0;
  const totP=bpN+gpN,totA=baN+gaN;
  const pct=totS>0?Math.round(totP/totS*100):null;

  const save=(field,val)=>{
    if(!cls||isHoliday)return;
    const max=field==='bp'?cls.boys:cls.girls;
    const num=Math.min(max,Math.max(0,parseInt(val)||0));
    setAttendance(p=>{const day={...(p[date]||{})},ca={...(day[cls.id]||{})};ca[field]=num;day[cls.id]=ca;return{...p,[date]:day};});
  };

  const inputStyle=(color)=>({
    background:T.card2,color,border:`2px solid ${color}66`,borderRadius:10,
    padding:'8px 4px',fontSize:26,fontWeight:900,fontFamily:"'Nunito',sans-serif",
    width:'100%',outline:'none',textAlign:'center',boxSizing:'border-box'
  });
  const autoBox=(color,val)=>(
    <div style={{background:T.surface,border:`2px solid ${color}33`,borderRadius:10,padding:'8px 4px',fontSize:26,fontWeight:900,color,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',minHeight:52}}>{val}</div>
  );

  return(
    <div>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:11,fontWeight:800,color:T.sub,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:5}}>Date</label>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:T.surface,color:T.text,border:`1.5px solid ${T.border2}`,borderRadius:10,padding:'11px 14px',fontSize:14,fontFamily:"'Nunito',sans-serif",width:'100%',outline:'none'}}/>
      </div>

      {isHoliday&&<div style={{background:`${T.yellow}18`,border:`1px solid ${T.yellow}44`,borderRadius:12,padding:'14px 18px',textAlign:'center',color:T.yellow,fontWeight:800,fontSize:15}}>
        {isSunday(date)?'🔵 Sunday — No Attendance Required':'🎉 Holiday — School Closed'}
        <div style={{fontSize:12,fontWeight:600,color:T.sub,marginTop:4}}>{holidays.find(h=>h.date===date)?.reason||''}</div>
      </div>}

      {!cls&&!isHoliday&&<div style={{textAlign:'center',color:T.muted,padding:'40px 0',fontSize:14}}>Please select a class above.</div>}

      {cls&&!isHoliday&&<>
        {/* Summary bar */}
        <div style={{display:'flex',justifyContent:'space-around',background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'14px 10px',marginBottom:14}}>
          <Stat value={hasData?totP:'—'} label="PRESENT" color={T.green}/>
          <Stat value={hasData?totA:'—'} label="ABSENT" color={T.red}/>
          <Stat value={totS} label="TOTAL" color={T.text}/>
          <Stat value={hasData&&pct!==null?`${pct}%`:'—'} label="RATE" color={T.yellow}/>
        </div>

        {/* BOYS card */}
        <div style={{background:T.card,border:`1px solid ${T.accent}44`,borderRadius:16,padding:'14px 16px',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:900,color:T.accent}}>👦 Boys</span>
            <Badge color={T.accent}>Strength: {cls.boys}</Badge>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:T.green,textTransform:'uppercase',letterSpacing:'0.06em',textAlign:'center',marginBottom:5}}>✏️ Present</div>
              <input type="number" min="0" max={cls.boys} value={bp} placeholder="—" onChange={e=>save('bp',e.target.value)} style={inputStyle(T.green)}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:T.red,textTransform:'uppercase',letterSpacing:'0.06em',textAlign:'center',marginBottom:5}}>⚡ Absent</div>
              {autoBox(T.red,bp!==''?baN:'—')}
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:T.accent,textTransform:'uppercase',letterSpacing:'0.06em',textAlign:'center',marginBottom:5}}>📊 Total</div>
              {autoBox(T.accent,cls.boys)}
            </div>
          </div>
        </div>

        {/* GIRLS card */}
        <div style={{background:T.card,border:`1px solid ${T.orange}44`,borderRadius:16,padding:'14px 16px',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:900,color:T.orange}}>👧 Girls</span>
            <Badge color={T.orange}>Strength: {cls.girls}</Badge>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:T.green,textTransform:'uppercase',letterSpacing:'0.06em',textAlign:'center',marginBottom:5}}>✏️ Present</div>
              <input type="number" min="0" max={cls.girls} value={gp} placeholder="—" onChange={e=>save('gp',e.target.value)} style={inputStyle(T.green)}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:T.red,textTransform:'uppercase',letterSpacing:'0.06em',textAlign:'center',marginBottom:5}}>⚡ Absent</div>
              {autoBox(T.red,gp!==''?gaN:'—')}
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:T.orange,textTransform:'uppercase',letterSpacing:'0.06em',textAlign:'center',marginBottom:5}}>📊 Total</div>
              {autoBox(T.orange,cls.girls)}
            </div>
          </div>
        </div>

        {/* Combined result */}
        {hasData&&(
          <div style={{background:`linear-gradient(135deg,${T.green}12,${T.accent}12)`,border:`1px solid ${T.green}33`,borderRadius:14,padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:800,color:T.sub,marginBottom:10,letterSpacing:'0.05em'}}>OVERALL — {cls.name} · {fmtDate(date)}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,textAlign:'center',marginBottom:8}}>
              <div><div style={{fontSize:22,fontWeight:900,color:T.green}}>{totP}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>PRESENT</div></div>
              <div><div style={{fontSize:22,fontWeight:900,color:T.red}}>{totA}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>ABSENT</div></div>
              <div><div style={{fontSize:22,fontWeight:900,color:T.text}}>{totS}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>TOTAL</div></div>
              <div><div style={{fontSize:22,fontWeight:900,color:pctColor(pct)}}>{pct!==null?`${pct}%`:'—'}</div><div style={{fontSize:9,color:T.sub,fontWeight:700}}>RATE</div></div>
            </div>
            {pct!==null&&<PctBar pct={pct}/>}
          </div>
        )}
      </>}
    </div>
  );
}

/* ════════════════════════════════════════
   TEACHER — MONTHLY  (daily grid + boys/girls breakdown)
════════════════════════════════════════ */
function TeacherMonthly({classes,selectedClass,holidays,attendance}){
  const now=new Date();
  const[vp,setVp]=useState({y:now.getFullYear(),m:now.getMonth()});
  const cls=classes.find(c=>c.id===selectedClass);

  if(!cls)return<div style={{textAlign:'center',color:T.muted,padding:'40px 0',fontSize:14}}>Please select a class above.</div>;
  const tot=cls.boys+cls.girls;
  let monthBP=0,monthGP=0,daysEntered=0;
  workDays.forEach(date=>{const d=attendance[date]?.[cls.id];if(d&&(d.bp!==undefined||d.gp!==undefined)){monthBP+=d.bp||0;monthGP+=d.gp||0;daysEntered++;}});
  const monthP=monthBP+monthGP,maxSlots=workDays.length*tot;
  const monthPct=maxSlots>0?Math.round(monthP/maxSlots*100):null;
  const bPct=workDays.length*cls.boys>0?Math.round(monthBP/(workDays.length*cls.boys)*100):null;
  const gPct=workDays.length*cls.girls>0?Math.round(monthGP/(workDays.length*cls.girls)*100):null;

  return(
    <div>
      <MonthNav y={vp.y} m={vp.m} onChange={setVp}/>
      <WDStrip y={vp.y} m={vp.m} holidays={holidays}/>

      {/* Monthly overview */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'14px 18px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div>
            <div style={{fontWeight:900,fontSize:16,color:T.text}}>{cls.name}</div>
            <div style={{fontSize:12,color:T.sub}}>{daysEntered}/{workDays.length} days entered · {tot} students</div>
          </div>
          <div style={{fontSize:28,fontWeight:900,color:pctColor(monthPct)}}>{monthPct!==null?`${monthPct}%`:'—'}</div>
        </div>
        {monthPct!==null&&<PctBar pct={monthPct}/>}
        <GenderRow icon="👦" label="Boys" color={T.accent} present={monthBP} absent={workDays.length*cls.boys-monthBP} total={cls.boys} pct={bPct}/>
        <GenderRow icon="👧" label="Girls" color={T.orange} present={monthGP} absent={workDays.length*cls.girls-monthGP} total={cls.girls} pct={gPct}/>
      </div>

      {/* Daily grid */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'14px 18px'}}>
        <div style={{fontSize:11,fontWeight:800,color:T.sub,marginBottom:10,letterSpacing:'0.05em'}}>DAILY ATTENDANCE — tap a day for details</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {workDays.map(date=>{
            const d=attendance[date]?.[cls.id];
            const hasD=d&&(d.bp!==undefined||d.gp!==undefined);
            const bp=hasD?d.bp||0:null,gp=hasD?d.gp||0:null;
            const tp=hasD?bp+gp:null;
            const dayPct=hasD&&tot>0?Math.round(tp/tot*100):null;
            const dc=pctColor(dayPct);
            const day=new Date(date+'T12:00:00').getDate();
            return(
              <div key={date} title={hasD?`${fmtDate(date)}\nBoys: ${bp}P / ${cls.boys-bp}A\nGirls: ${gp}P / ${cls.girls-gp}A\n${dayPct}%`:`${fmtDate(date)}: Not entered`}
                style={{width:40,height:40,borderRadius:8,background:hasD?`${dc}33`:T.surface,border:`1.5px solid ${hasD?dc:T.border}`,
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:hasD?dc:T.muted,cursor:'default',userSelect:'none'}}>
                <div>{day}</div>
                {hasD&&<div style={{fontSize:9,fontWeight:700}}>{dayPct}%</div>}
              </div>
            );
          })}
        </div>
        {daysEntered===0&&<div style={{textAlign:'center',color:T.muted,fontSize:13,paddingTop:12}}>No attendance entered yet for this month.</div>}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TEACHER DASHBOARD
════════════════════════════════════════ */
function TeacherDashboard({user,classes,holidays,attendance,setAttendance,onLogout}){
  const[tab,setTab]=useState('today');
  const[cls,setCls]=useState(classes[0]?.id||null);
  const tabs=[{id:'today',label:"Today's",icon:'✅'},{id:'monthly',label:'Monthly',icon:'📅'}];
  return<div style={SS}><Header user={user} onLogout={onLogout}/>
    <div style={{padding:'16px 16px 90px'}}>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:11,fontWeight:800,color:T.sub,textTransform:'uppercase',letterSpacing:'0.07em',display:'block',marginBottom:8}}>Select Class</label>
        {classes.length===0
          ?<div style={{color:T.muted,fontSize:13}}>No classes yet. Ask admin to create classes.</div>
          :<div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {sortClasses(classes).map(c=><button key={c.id} onClick={()=>setCls(c.id)} style={{background:cls===c.id?T.accent:T.card,color:cls===c.id?T.bg:T.text,border:`1.5px solid ${cls===c.id?T.accent:T.border}`,borderRadius:10,padding:'9px 16px',fontSize:13,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>
              {c.name}<span style={{fontSize:11,marginLeft:5,opacity:0.7}}>({c.boys+c.girls})</span>
            </button>)}
          </div>
        }
      </div>
      {tab==='today'  &&<TeacherToday   classes={classes} selectedClass={cls} holidays={holidays} attendance={attendance} setAttendance={setAttendance}/>}
      {tab==='monthly'&&<TeacherMonthly classes={classes} selectedClass={cls} holidays={holidays} attendance={attendance}/>}
    </div>
    <TabBar tabs={tabs} active={tab} onChange={setTab}/>
  </div>;
}

/* ════════════════════════════════════════
   PRINCIPAL — TODAY  (per-class boys/girls breakdown)
════════════════════════════════════════ */
function PrincipalToday({classes,holidays,attendance}){
  const[date,setDate]=useState(todayKey());
  const hSet=new Set(holidays.map(h=>h.date));
  const isHoliday=hSet.has(date)||isSunday(date);

  const schoolTotals=useMemo(()=>{
    let bp=0,gp=0,bs=0,gs=0;
    classes.forEach(cls=>{const d=attendance[date]?.[cls.id]||{};bp+=d.bp||0;gp+=d.gp||0;bs+=cls.boys;gs+=cls.girls;});
    const tot=bs+gs,pres=bp+gp;
    return{bp,gp,bs,gs,tot,pres,pct:tot>0?Math.round(pres/tot*100):null};
  },[classes,attendance,date]);

  return(
    <div>
      <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:16}}>All Classes — Today</div>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:T.surface,color:T.text,border:`1.5px solid ${T.border2}`,borderRadius:10,padding:'11px 14px',fontSize:14,fontFamily:"'Nunito',sans-serif",width:'100%',outline:'none',marginBottom:16}}/>

      {isHoliday&&<div style={{background:`${T.yellow}18`,border:`1px solid ${T.yellow}44`,borderRadius:12,padding:'14px 18px',textAlign:'center',color:T.yellow,fontWeight:800,fontSize:15,marginBottom:16}}>{isSunday(date)?'🔵 Sunday — No School':'🎉 Holiday — School Closed'}</div>}

      {/* School-wide today summary */}
      {!isHoliday&&classes.length>0&&(()=>{
        const{bp,gp,bs,gs,tot,pres,pct}=schoolTotals;
        const bPct=bs>0?Math.round(bp/bs*100):null,gPct=gs>0?Math.round(gp/gs*100):null;
        return(
          <div style={{background:`linear-gradient(135deg,${T.accent}15,${T.indigo}15)`,border:`1px solid ${T.accent}33`,borderRadius:14,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:800,color:T.sub,marginBottom:10,letterSpacing:'0.04em'}}>SCHOOL-WIDE · {fmtDate(date)}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,textAlign:'center',marginBottom:10}}>
              <Stat value={pres} label="PRESENT" color={T.green}/>
              <Stat value={tot-pres} label="ABSENT" color={T.red}/>
              <Stat value={tot} label="TOTAL" color={T.text}/>
              <Stat value={pct!==null?`${pct}%`:'—'} label="RATE" color={T.yellow}/>
            </div>
            {pct!==null&&<PctBar pct={pct}/>}
            <GenderRow icon="👦" label="Boys" color={T.accent} present={bp} absent={bs-bp} total={bs} pct={bPct}/>
            <GenderRow icon="👧" label="Girls" color={T.orange} present={gp} absent={gs-gp} total={gs} pct={gPct}/>
          </div>
        );
      })()}

      {/* Per-class cards */}
      {!isHoliday&&sortClasses(classes).map(cls=>{
        const d=attendance[date]?.[cls.id]||{};
        const bp=d.bp!==undefined?d.bp:null,gp=d.gp!==undefined?d.gp:null;
        const hasData=bp!==null||gp!==null;
        const bpN=bp||0,gpN=gp||0;
        const tot=cls.boys+cls.girls,pres=bpN+gpN;
        const pct=hasData&&tot>0?Math.round(pres/tot*100):null,pc=pctColor(pct);
        const bPct=hasData&&cls.boys>0?Math.round(bpN/cls.boys*100):null;
        const gPct=hasData&&cls.girls>0?Math.round(gpN/cls.girls*100):null;
        return(
          <div key={cls.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,marginBottom:14,padding:'16px 18px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <div style={{fontWeight:900,fontSize:16,color:T.text}}>{cls.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {!hasData&&<Badge color={T.muted}>Not Entered</Badge>}
                <div style={{fontSize:26,fontWeight:900,color:pc}}>{pct!==null?`${pct}%`:'—'}</div>
              </div>
            </div>
            {pct!==null&&<PctBar pct={pct}/>}
            {hasData
              ?<>
                <GenderRow icon="👦" label="Boys" color={T.accent} present={bpN} absent={cls.boys-bpN} total={cls.boys} pct={bPct}/>
                <GenderRow icon="👧" label="Girls" color={T.orange} present={gpN} absent={cls.girls-gpN} total={cls.girls} pct={gPct}/>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:800,paddingTop:8,marginTop:2}}>
                  <span style={{color:T.sub}}>Total</span>
                  <div style={{display:'flex',gap:12}}><span style={{color:T.green}}>P: {pres}</span><span style={{color:T.red}}>A: {tot-pres}</span><span style={{color:T.text}}>{tot}</span></div>
                </div>
              </>
              :<div style={{fontSize:12,color:T.muted,marginTop:6}}>Strength: 👦 {cls.boys} boys · 👧 {cls.girls} girls · Total {tot}</div>
            }
          </div>
        );
      })}
      {classes.length===0&&!isHoliday&&<div style={{textAlign:'center',color:T.muted,padding:'40px 0',fontSize:14}}>No classes created yet.</div>}
    </div>
  );
}

/* ════════════════════════════════════════
   PRINCIPAL — MONTHLY  (per-class boys/girls monthly)
════════════════════════════════════════ */
function PrincipalMonthly({classes,holidays,attendance}){
  const now=new Date();
  const[vp,setVp]=useState({y:now.getFullYear(),m:now.getMonth()});
  const workDays=useMemo(()=>getWorkingDays(vp.y,vp.m,holidays),[vp,holidays]);

  const schoolTotal=useMemo(()=>{
    let bpAll=0,gpAll=0,bStr=0,gStr=0;
    classes.forEach(cls=>{
      bStr+=cls.boys;gStr+=cls.girls;
      workDays.forEach(date=>{const d=attendance[date]?.[cls.id]||{};bpAll+=d.bp||0;gpAll+=d.gp||0;});
    });
    const maxB=workDays.length*bStr,maxG=workDays.length*gStr;
    const pres=bpAll+gpAll,total=maxB+maxG;
    return{bpAll,gpAll,bStr,gStr,maxB,maxG,pres,total,pct:total>0?Math.round(pres/total*100):null};
  },[workDays,classes,attendance]);

  return(
    <div>
      <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:16}}>Monthly — All Classes</div>
      <MonthNav y={vp.y} m={vp.m} onChange={setVp}/>
      <WDStrip y={vp.y} m={vp.m} holidays={holidays}/>

      {/* School-wide monthly */}
      {classes.length>0&&(()=>{
        const{bpAll,gpAll,bStr,gStr,maxB,maxG,pres,total,pct}=schoolTotal;
        const bPct=maxB>0?Math.round(bpAll/maxB*100):null,gPct=maxG>0?Math.round(gpAll/maxG*100):null;
        return(
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'16px 18px',marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:800,color:T.sub,marginBottom:8,letterSpacing:'0.04em'}}>SCHOOL-WIDE AVERAGE</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:13,color:T.sub}}>{pres} present of {total} slots</div>
              <div style={{fontSize:32,fontWeight:900,color:pctColor(pct)}}>{pct!==null?`${pct}%`:'—'}</div>
            </div>
            {pct!==null&&<PctBar pct={pct}/>}
            <GenderRow icon="👦" label="Boys" color={T.accent} present={bpAll} absent={maxB-bpAll} total={bStr} pct={bPct}/>
            <GenderRow icon="👧" label="Girls" color={T.orange} present={gpAll} absent={maxG-gpAll} total={gStr} pct={gPct}/>
          </div>
        );
      })()}

      {/* Per-class monthly cards */}
      {sortClasses(classes).map(cls=>{
        let bp=0,gp=0,daysEntered=0;
        workDays.forEach(date=>{const d=attendance[date]?.[cls.id];if(d&&(d.bp!==undefined||d.gp!==undefined)){bp+=d.bp||0;gp+=d.gp||0;daysEntered++;}});
        const tot=cls.boys+cls.girls,maxSlots=workDays.length*tot,pres=bp+gp;
        const pct=maxSlots>0?Math.round(pres/maxSlots*100):null,pc=pctColor(pct);
        const bPct=workDays.length*cls.boys>0?Math.round(bp/(workDays.length*cls.boys)*100):null;
        const gPct=workDays.length*cls.girls>0?Math.round(gp/(workDays.length*cls.girls)*100):null;

        const dayBars=workDays.map(date=>{
          const d=attendance[date]?.[cls.id];
          const hasD=d&&(d.bp!==undefined||d.gp!==undefined);
          const tp=hasD?(d.bp||0)+(d.gp||0):null;
          return{date,tp,pct:hasD&&tot>0?Math.round(tp/tot*100):null,hasD};
        });

        return(
          <div key={cls.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,marginBottom:14,overflow:'hidden'}}>
            <div style={{padding:'16px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:900,fontSize:16,color:T.text}}>{cls.name}</div>
                  <div style={{fontSize:12,color:T.sub,marginTop:2}}>{daysEntered}/{workDays.length} days entered · {tot} students</div>
                </div>
                <div style={{fontSize:26,fontWeight:900,color:pc}}>{pct!==null?`${pct}%`:'—'}</div>
              </div>
              {pct!==null&&<PctBar pct={pct}/>}
              <GenderRow icon="👦" label="Boys" color={T.accent} present={bp} absent={workDays.length*cls.boys-bp} total={cls.boys} pct={bPct}/>
              <GenderRow icon="👧" label="Girls" color={T.orange} present={gp} absent={workDays.length*cls.girls-gp} total={cls.girls} pct={gPct}/>
            </div>

            {/* Daily mini-grid */}
            <div style={{padding:'0 18px 16px',display:'flex',flexWrap:'wrap',gap:4}}>
              {dayBars.map(({date,pct:dp,hasD})=>{
                const d=new Date(date+'T12:00:00').getDate(),dc=pctColor(dp);
                return<div key={date} title={fmtDate(date)} style={{width:30,height:30,borderRadius:6,background:hasD?`${dc}33`:T.surface,border:`1px solid ${hasD?dc:T.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:hasD?dc:T.muted}}>{d}</div>;
              })}
            </div>
          </div>
        );
      })}
      {classes.length===0&&<div style={{textAlign:'center',color:T.muted,fontSize:14,padding:'40px 0'}}>No classes available.</div>}
    </div>
  );
}

/* ════════════════════════════════════════
   PRINCIPAL DASHBOARD
════════════════════════════════════════ */
function PrincipalDashboard({user,classes,holidays,attendance,onLogout}){
  const[tab,setTab]=useState('today');
  const tabs=[{id:'today',label:"Today's",icon:'📋'},{id:'monthly',label:'Monthly',icon:'📊'}];
  return<div style={SS}><Header user={user} onLogout={onLogout}/>
    <div style={{padding:'16px 16px 90px'}}>
      {tab==='today'  &&<PrincipalToday   classes={classes} holidays={holidays} attendance={attendance}/>}
      {tab==='monthly'&&<PrincipalMonthly classes={classes} holidays={holidays} attendance={attendance}/>}
    </div>
    <TabBar tabs={tabs} active={tab} onChange={setTab}/>
  </div>;
}

/* ════════════════════════════════════════
   ROOT APP
════════════════════════════════════════ */
function App(){
  const[auth,setAuth]=useState(null);
  const[classes,   setClasses]   =useLs('edu_classes2',  []);
  const[holidays,  setHolidays]  =useLs('edu_holidays',  []);
  const[attendance,setAttendance]=useLs('edu_attend2',   {});
  const login =(un,u)=>setAuth({un,u});
  const logout=()=>setAuth(null);
  if(!auth)return<LoginScreen onLogin={login}/>;
  const{u}=auth;
  const props={user:u,classes,holidays,attendance,onLogout:logout};
  if(u.role==='admin')     return<AdminDashboard     {...props} setClasses={setClasses} setHolidays={setHolidays}/>;
  if(u.role==='teacher')   return<TeacherDashboard   {...props} setAttendance={setAttendance}/>;
  if(u.role==='principal') return<PrincipalDashboard {...props}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
