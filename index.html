<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── PWA / Theme ── -->
    <meta name="theme-color" content="#0F172A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduAttend" />

    <!-- ── SEO / Description ── -->
    <meta name="description" content="EduAttend — Role-based school attendance management for teachers, admin, and principals." />
    <meta name="application-name" content="EduAttend" />

    <!-- ── Manifest ── -->
    <link rel="manifest" href="./manifest.json" />

    <!-- ── Icons ── -->
    <!-- Standard favicon -->
    <link rel="icon"             type="image/svg+xml"  href="./icon.svg" />
    <link rel="icon"             type="image/png" sizes="192x192" href="./icon-192.png" />
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png" />

    <!-- ── Apple splash screens (optional, enhances iOS PWA feel) ── -->
    <!--
    <link rel="apple-touch-startup-image" href="./splash-750x1334.png"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    -->

    <title>EduAttend - School Attendance</title>

    <!-- ── Nunito Font ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      /* ── Reset & base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        background: #0F172A;
        font-family: 'Nunito', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* ── Scrollbar hide (clean mobile feel) ── */
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; -ms-overflow-style: none; }

      /* ── Input / select native reset ── */
      input, select, textarea, button {
        font-family: 'Nunito', 'Segoe UI', sans-serif;
        -webkit-appearance: none;
        appearance: none;
      }

      /* ── Safe-area support (iPhone notch / Android cutout) ── */
      body {
        padding-top:    env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
      }

      /* ── PWA install banner (hidden by default, shown via JS) ── */
      #pwa-install-banner {
        display: none;
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #1E293B;
        border: 1px solid #38BDF8;
        border-radius: 14px;
        padding: 12px 20px;
        color: #F1F5F9;
        font-family: 'Nunito', sans-serif;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        white-space: nowrap;
      }
      #pwa-install-banner button {
        background: linear-gradient(135deg, #38BDF8, #818CF8);
        color: #0F172A;
        border: none;
        border-radius: 8px;
        padding: 6px 14px;
        font-weight: 800;
        cursor: pointer;
        font-size: 13px;
      }
      #pwa-install-banner .close-btn {
        background: transparent;
        color: #94A3B8;
        font-size: 18px;
        padding: 0 4px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ── PWA Install Banner ── -->
    <div id="pwa-install-banner">
      📋 Add EduAttend to Home Screen
      <button id="pwa-install-btn">Install</button>
      <button class="close-btn" id="pwa-close-btn">✕</button>
    </div>

    <!-- ── React App Entry ── -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Service Worker Registration ── -->
    <script>
      /* ─── Register Service Worker ─── */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('./sw.js', { scope: './' })
            .then((reg) => {
              console.log('[PWA] Service worker registered. Scope:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Service worker registration failed:', err);
            });
        });
      }

      /* ─── PWA Install Prompt ─── */
      let deferredPrompt = null;
      const banner      = document.getElementById('pwa-install-banner');
      const installBtn  = document.getElementById('pwa-install-btn');
      const closeBtn    = document.getElementById('pwa-close-btn');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        /* Show install banner after a short delay */
        setTimeout(() => {
          if (banner) banner.style.display = 'flex';
        }, 3000);
      });

      if (installBtn) {
        installBtn.addEventListener('click', async () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('[PWA] Install outcome:', outcome);
          deferredPrompt = null;
          if (banner) banner.style.display = 'none';
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          if (banner) banner.style.display = 'none';
        });
      }

      window.addEventListener('appinstalled', () => {
        console.log('[PWA] App installed successfully!');
        if (banner) banner.style.display = 'none';
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
